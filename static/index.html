<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini TTS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      overflow: hidden;
    }

    .header {
      padding: 24px 24px 16px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
      
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
    }

    .content {
      padding: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      resize: vertical;
      font-family: inherit;
      transition: border 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 16px;
      margin: 20px 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #e74c3c;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 12px;
      text-align: center;
    }

    .result {
      display: none;
      margin-top: 20px;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 24px 0;
    }

    .result-box {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 12px;
      font-size: 15.5px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 24px;
      border: 1px solid #eee;
    }

    .player-wrap {
      margin-top: 8px;
    }

    audio {
      width: 100%;
      border-radius: 12px;
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      .card {
        border-radius: 16px;
      }
      .header, .content {
        padding: 20px 18px;
      }
      .header h1 {
        font-size: 24px;
      }
      textarea {
        min-height: 120px;
        font-size: 15.5px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h1>Gemini TTS</h1>
      <div class="subtitle">Text to Speech with Gemini</div>
    </div>

    <div class="content">
      <label for="inputText">Input Text</label>
      <textarea id="inputText" placeholder="Enter the text you want to convert to speech..."></textarea>

      <button class="btn" id="generateBtn" onclick="generate()">
        ✨ Generate Speech
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <div class="result" id="result">
        <div class="divider"></div>
        <label>Refined Text by AI</label>
        <div class="result-box" id="aiText"></div>
        
        <label>Generated Audio</label>
        <div class="player-wrap">
          <audio id="audioPlayer" controls></audio>
        </div>
      </div>
    </div>
  </div>

  <script>
    function generate() {
      const text = document.getElementById('inputText').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const result = document.getElementById('result');

      if (!text) {
        errorMsg.textContent = "Please enter some text to convert.";
        return;
      }

      errorMsg.textContent = "";
      result.style.display = "block";

      // Example: Simulate refined text (you can replace with real AI logic later)
      document.getElementById('aiText').textContent = text.length > 200 
        ? text.substring(0, 200) + "..." 
        : text;

      // For demo - you would replace this with actual TTS API call
      console.log("Generating speech for:", text);
    }
  </script>

</body>
</html>
